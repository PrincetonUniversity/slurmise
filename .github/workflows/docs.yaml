name: Build and Deploy Documentation

on:
  # Build docs on all PRs to main (merge prerequisite)
  pull_request:
    branches:
      - main

  # Build and deploy on pushes to main or docs branches
  push:
    branches:
      - main
      - 'docs/**'
      - '**/docs'

# Sets permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build documentation
        # When docs are mature, switch to: uv run poe docs
        # - also update Pages source to the gh-pages branch
        # - and use JamesIves/github-pages-deploy-action
        #   to enable a separate "active" and "dev" version of the docs
        # run: uv run poe docs
        run: uv run poe docs-dev

      - name: Check for broken links
        run: uv run --group docs sphinx-build -b linkcheck docs docs/_build/linkcheck
        continue-on-error: true  # Don't fail build on broken external links

      - name: Upload artifact for GitHub Pages
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
